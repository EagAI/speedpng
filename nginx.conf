server {
    listen 8080;
    root /usr/share/nginx/html;
    index index.html;

    gzip on;
    gzip_types text/plain text/css application/javascript application/json image/svg+xml image/png image/jpeg;
    gzip_min_length 1024;

    # Proxy /img/ to Supabase storage so URLs appear as uzgrudinti.dev/img/name.png
    location /img/ {
        proxy_pass https://vcctxjihxpzefqxdeddm.supabase.co/storage/v1/object/public/images/img/;
        proxy_ssl_server_name on;
        proxy_set_header Host vcctxjihxpzefqxdeddm.supabase.co;
        proxy_hide_header x-powered-by;
        add_header Cache-Control "public, max-age=31536000, immutable";
    }

    location / {
        try_files $uri $uri/ /index.html;
    }

    location ~* \.(js|css|svg|ico|woff2?)$ {
        expires 1y;
        add_header Cache-Control "public, immutable";
    }
}
